<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crachás - 4 por Folha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 700px;
            gap: 15px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-family: inherit;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background: #4A90E2; color: white; }
        .btn-print { background: #27ae60; color: white; }

        /* Estrutura da Folha A4 */
        .container {
            width: 21cm;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            background: white;
        }
        .cracha {
            width: 10cm; /* Ajustado para melhor aproveitamento */
            height: 14cm; /* 4 crachás por A4 */
            border: 1px solid #eee;
            margin: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            
            /* IMAGEM DE FUNDO ÚNICA */
            background-image: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/CrachaRetiroEucaristia/main/Retiro%201%C2%AA%20Eucaristia.png'; 
            background-size: cover;
            background-position: center;
        }
        
        .nome {
        /* 1. MUDANÇA: Tamanho máximo da fonte menor para começar mais equilibrado */
        font-size: 36px; 
        font-weight: 800;
        text-align: center;
        text-transform: uppercase;
        
        /* 2. MUDANÇA: Define uma largura segura (com margem lateral) */
        width: 8.5cm; /* Largura total de 10.5cm - 1cm de margem de cada lado */
        
        /* 3. MUDANÇA: A mágica para adaptar o texto ao espaço */
        word-wrap: break-word; /* Permite quebrar a palavra se necessário */
        word-break: break-all; /* Força quebra em nomes compostos longos ou palavras únicas gigantes */
        
        color: #000; 
        text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
        
        /* 4. AJUSTE: Garante que o texto fique centralizado horizontal e verticalmente */
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%; /* Ocupa a altura total do crachá, centralizando o texto verticalmente */
        box-sizing: border-box; /* Garante que as margens não alterem o tamanho total */
        }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; padding: 0; }
            .controls { display: none; }
            .container { width: 21cm; height: 29.7cm; padding: 0; }
            .cracha { border: 0.1mm solid #ddd; page-break-inside: avoid; }
            .cracha:nth-child(4n+5) { page-break-before: always; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label><b>1. Cole os nomes completos:</b></label>
        <textarea id="inputRaw" rows="4" placeholder="Ex: João Silva, Maria de Souza..."></textarea>
        
        <button class="btn btn-primary" onclick="processarEValidar()">1. Processar Nomes (Diferenciar Iguais)</button>

        <label><b>2. Nomes que serão impressos:</b></label>
        <textarea id="inputFinal" rows="4"></textarea>

        <div class="btn-group">
            <button class="btn btn-print" onclick="gerarCrachas()">2. Gerar Visualização</button>
            <button class="btn btn-primary" style="background:#555" onclick="window.print()">3. Imprimir</button>
        </div>
    </div>

    <div class="container" id="container"></div>

    <script>
        const PREPOSICOES = ['de', 'do', 'da', 'dos', 'das'];

        function determineProcessedName(name, allNames) {
            const parts = name.split(' ').filter(p => p.length > 0);
            const firstName = parts[0];
            const firstNameCount = allNames.filter(n => n.split(' ')[0].toUpperCase() === firstName.toUpperCase()).length;

            if (firstNameCount === 1 || parts.length === 1) return firstName;

            let currentParts = [firstName];
            let i = 1;
            while (i < parts.length) {
                let next = parts[i];
                currentParts.push(next);
                i++;

                if (PREPOSICOES.includes(next.toLowerCase()) && i < parts.length) {
                    currentParts.push(parts[i]);
                    i++;
                }

                const segment = currentParts.join(' ');
                let isUnique = true;
                for (const other of allNames) {
                    if (other.toUpperCase() === name.toUpperCase()) continue;
                    if (other.toUpperCase().startsWith(segment.toUpperCase())) {
                        isUnique = false;
                        break;
                    }
                }
                if (isUnique) return segment;
            }
            return name;
        }

        function processarEValidar() {
            const raw = document.getElementById('inputRaw').value;
            const listaOriginal = raw.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
            const processados = listaOriginal.map(n => determineProcessedName(n, listaOriginal));
            document.getElementById('inputFinal').value = processados.join(', ');
        }

        function gerarCrachas() {
            const finalInput = document.getElementById('inputFinal').value;
            const nomes = finalInput.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
            const container = document.getElementById('container');
            container.innerHTML = '';

            nomes.forEach(nome => {
                const card = document.createElement('div');
                card.className = 'cracha';
                card.innerHTML = `<div class="nome">${nome}</div>`;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
